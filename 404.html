<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Veterinary Business Institute</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .error-page h1 { font-size: 6rem; color: #0D7377; margin-bottom: 0.5rem; }
        .error-page h2 { font-size: 1.8rem; color: #1B2A4A; margin-bottom: 1rem; }
        .error-page p { color: #555; max-width: 500px; margin: 0 auto 2rem; }
        .error-page .btn { display: inline-block; background: #0D7377; color: #fff; padding: 0.8rem 2rem; border-radius: 6px; text-decoration: none; font-weight: 600; }
        .error-page .btn:hover { background: #0a5c5f; }
    </style>
</head>
<body>
    <div class="error-page">
        <div>
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <a href="/" class="btn">Back to Home</a>
        </div>
    </div>
</body>
</html>
